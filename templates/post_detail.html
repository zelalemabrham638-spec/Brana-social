cat <<EOF > templates/post_detail.html
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brana - Post Detail</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .nav { background: white; width: 100%; max-width: 500px; padding: 12px 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: #1877f2; font-weight: bold; font-size: 18px; margin-right: 15px; }
        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        .post-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post-header { display: flex; align-items: center; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; background: #ddd; border-radius: 50%; margin-right: 10px; }
        .username { font-weight: bold; color: #1c1e21; }
        .post-content { font-size: 18px; line-height: 1.6; color: #1c1e21; white-space: pre-wrap; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 15px; }
        .stats { border-top: 1px solid #eee; margin-top: 15px; padding-top: 10px; color: #65676b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/feed" class="back-btn">←</a>
        <span style="font-weight:bold; font-size:18px;">Post</span>
    </div>

    <div class="container">
        <div class="post-card">
            <div class="post-header">
                <div class="avatar"></div>
                <div>
                    <div class="username">@{{ post.author.username }}</div>
                    <div style="font-size:12px; color:#65676b;">{{ post.timestamp.strftime('%B %d, %Y') }}</div>
                </div>
            </div>
            
            <div class="post-content">{{ post.content }}</div>
            
            {% if post.image_url %}
            <img src="{{ post.image_url }}" class="post-img">
            {% endif %}

            <div class="stats">
                👍 {{ post.likes|length }} Likes • 👁️ {{ post.views }} Views
            </div>
        </div>
        
        <div style="text-align:center; margin-top:20px;">
            <a href="/feed" style="color:#1877f2; text-decoration:none; font-weight:bold;">ወደ ዋናው ገጽ ተመለስ</a>
        </div>
    </div>
</body>
</html>
EOF
